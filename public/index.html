<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ritmo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="contenedor">
        <h1><i class="fa-solid fa-person-running"></i> Ritmo del Corredor</h1>
        <form id="paceForm">
            <label for="distancia"><i class="fa-solid fa-route"></i> Distancia (km):</label>
            <select id="distancia" required>
                <option value="5">5k</option>
                <option value="10">10k</option>
                <option value="21.097">Media Maratón (21k)</option>
                <option value="42.195">Maratón (42k)</option>
                <option value="otra">Otra...</option> 
            </select>

            <input type="number" id="distanciaPersonalizada" class="oculto" placeholder="Ingresa los km (ej: 15.5)" step="0.01" min="0.1">

            <label for="horas"><i class="fa-solid fa-stopwatch"></i> Tiempo Objetivo:</label>
            <div class="tiempo-inputs">
                <input type="number" id="horas" placeholder="Hs" min="0" value="0" required>
                <input type="number" id="minutos" placeholder="Min" min="0" max="59" value="0" required>
                <input type="number" id="segundos" placeholder="Seg" min="0" max="59" value="0" required>
            </div>

            <button type="submit"><i class="fa-solid fa-calculator"></i> Calcular</button>
        </form>

        <div id="resultado" class="oculto">
            <h2><i class="fa-solid fa-shoe-prints"></i> Tu ritmo debe ser:</h2>
            <p id="ritmoMostrado">--:-- min/km</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
